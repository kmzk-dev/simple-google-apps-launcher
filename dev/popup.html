<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      width: 320px;
      background-color: #202124;
      color: #e8eaed;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 16px;
      user-select: none;
    }

    #app-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 4px;
      border-radius: 12px;
      cursor: grab;
      transition: background-color 0.2s;
    }

    .app-item:active { cursor: grabbing; }
    .app-item:hover { background-color: rgba(232, 234, 237, 0.08); }

    .dragging {
      opacity: 0.4;
      transform: scale(0.95);
    }

    .app-icon {
      width: 44px;
      height: 44px;
      margin-bottom: 8px;
      pointer-events: none;
      object-fit: contain;
    }

    .app-name {
      font-size: 11px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      pointer-events: none;
    }

    .header {
      padding-bottom: 12px;
      border-bottom: 1px solid #3c4043;
      margin-bottom: 12px;
      font-weight: 500;
    }

    /* popup.html の <style> 内に追加 */
    @keyframes shake {
      0% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
      100% { transform: rotate(-3deg); }
    }

    .dragging-mode .app-item:not(.dragging) {
      animation: shake 0.3s infinite;
    }

    /* ドラッグ中のアイテム自体のスタイルを微調整 */
    .app-item.dragging {
      opacity: 0.5;
      transform: scale(1.1);
      animation: none; /* ドラッグ中の本人は揺らさない */
      background-color: rgba(232, 234, 237, 0.15);
    }
    .reset-item {
      grid-column: 1 / -1; /* 横いっぱいに広げる場合 */
      margin-top: 8px;
      padding: 8px;
      border-top: 1px solid #3c4043;
      cursor: pointer;
      color: #bdc1c6;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .reset-item:hover {
      background-color: rgba(232, 234, 237, 0.08);
      color: #e8eaed;
    }
  </style>
</head>
<body>
  <div id="app-grid"></div>
  <div id="reset-button" class="reset-item">
    <span>並び替えをリセット</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
