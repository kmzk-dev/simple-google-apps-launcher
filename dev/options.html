<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google App Launcher Settings</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* options.html 固有のスタイル */
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Segoe UI', Tahoma, sans-serif;
      padding: 40px;
      max-width: 1000px;
      margin: 0 auto;
      line-height: 1.6;
    }

    header {
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 28px;
      font-weight: 400;
      margin: 0 0 10px 0;
    }

    .description {
      color: var(--text-sub);
      font-size: 15px;
    }

    .settings-section {
      margin-bottom: 32px;
      padding: 24px;
      background-color: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .settings-section h2 {
      font-size: 18px;
      font-weight: 500;
      margin-top: 0;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .settings-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
    }

    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 200px;
    }

    .setting-item label {
      font-size: 14px;
      color: var(--text-sub);
    }

    .setting-item select {
      background-color: var(--bg-color);
      color: var(--text-main);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .setting-item select:focus {
      border-color: var(--accent);
    }

    /* --- アプリ一覧グリッド --- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .app-toggle {
      background-color: var(--card-bg);
      padding: 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      user-select: none;
      min-height: 64px; /* icon-Large: 高さ調整 */
    }

    .app-toggle:hover {
      background-color: var(--card-hover);
      border-color: var(--border);
      transform: translateY(-2px);
    }

    .app-toggle input {
      margin-right: 16px;
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .app-info {
      display: flex;
      align-items: center;
      flex: 1;
    }

    .app-icon {
      object-fit: contain;
      margin-right: 12px;
      transition: width 0.2s, height 0.2s;
    }

    .app-name {
      font-size: 14px;
      font-weight: 500;
    }

    /* --- 保存ステータス通知 --- */
    #save-status {
      position: fixed;
      bottom: 40px;
      right: 40px;
      background-color: var(--accent);
      color: var(--bg-color);
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 100;
    }

    #save-status.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* スクロールバー */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #5f6368; }
  </style>
</head>
<body>
  <header>
    <h1>Settings</h1>
    <p class="description">Select the applications to display in the popup. Unchecking an app will hide it. You can change the order by dragging items in the popup.</p>
  </header>

  <section class="settings-section">
    <h2>Display Settings</h2>
    <div class="settings-grid">
      <div class="setting-item">
        <label for="icon-style-select">Icon Style</label>
        <select id="icon-style-select">
          <option value="origin">Default</option>
          <option value="dot">Dot Style</option>
        </select>
      </div>
      <div class="setting-item">
        <label for="icon-size-select">Icon Size</label>
        <select id="icon-size-select">
          <option value="small">Default</option>
          <option value="large">Large</option>
        </select>
      </div>
    </div>
  </section>
  
  <div id="app-list" class="grid">
    </div>
  
  <div id="save-status">Setting updated</div>

  <script src="options.js"></script>
</body>
</html>
